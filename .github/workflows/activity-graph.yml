name: Generate Activity Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-activity-graph
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: Ashutosh00710/github-readme-activity-graph@v1.2.3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          output_filepath: dist/activity-graph.svg
          theme: tokyonight
          area: true
          hide_border: true

      - name: push activity-graph.svg
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: activity-graph-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
